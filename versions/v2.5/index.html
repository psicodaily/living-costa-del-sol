<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Living Costa del Sol</title>
    <style>
      :root {
        --hud-bg: rgba(10, 20, 35, 0.72);
        --hud-accent: #ffd24a;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1423; }
      #game-canvas { display: block; width: 100vw; height: 100vh; }

      /* HUD */
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #fff;
        pointer-events: none;
        user-select: none;
      }
      #hud .title {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--hud-accent);
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
      }
      #hud .title small {
        color: #cfe3ff;
        font-weight: 600;
        font-size: 13px;
      }
      #hud .controls {
        margin-top: 10px;
        padding: 10px 14px;
        background: var(--hud-bg);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.6;
        backdrop-filter: blur(6px);
        max-width: 230px;
      }
      #hud .controls b { color: var(--hud-accent); }

      /* Pantalla de carga */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: linear-gradient(180deg, #1b3a5e 0%, #0a1423 100%);
        color: #fff;
        font-family: "Segoe UI", system-ui, sans-serif;
        z-index: 10;
        transition: opacity 0.6s ease;
      }
      #loading h1 { font-size: 28px; color: var(--hud-accent); letter-spacing: 1px; }
      #loading p { color: #bcd4ee; font-size: 14px; }
      #loading.hidden { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div class="title">LIVING COSTA DEL SOL <small id="version-label">v2.5</small></div>
      <div class="controls">
        <b>Flechas</b> o <b>WASD</b> — moverse / conducir<br />
        <b>E</b> — vehículo / tienda más cercana<br />
        <b>R</b> — cambiar emisora de radio<br />
        <b>Shift</b> — correr<br />
        <b>Ratón</b> — girar cámara (sin clic)<br />
        <b>Clic</b> o <b>M</b> — abrir el mapa<br />
        <b>Rueda</b> — acercar / alejar<br />
        <b>P</b> — pausa
      </div>
    </div>

    <div id="loading">
      <h1>LIVING COSTA DEL SOL</h1>
      <p>Cargando Marbella…</p>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
